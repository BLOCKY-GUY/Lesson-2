<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <p>The first one is a <b>superscript</b> where the letter or # goes above
        ; however, the second one, <b>subscript</b>, is 
        where the letter or # goes below.
    </p>
    
   1) 4<sup>6</sup><br>
   2) H<sub>2</sub>0<br>
   <i>This is italic</i><br>
   <b>This is bold</b><br>
   <strong>This is strong</strong><br>
   <em>This is a em tag</em><br>
   <mark>This is mark</mark><br>
   <small>This is small</small><br>
   <del>This is del<br>
</body>
</html>
